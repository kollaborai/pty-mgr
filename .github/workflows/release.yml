name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Cross-compile linux binaries
        run: |
          bun build bin/pty-mgr.mjs --compile --target=bun-linux-x64   --outfile dist/pty-mgr-linux-x64
          bun build bin/pty-mgr.mjs --compile --target=bun-linux-arm64 --outfile dist/pty-mgr-linux-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: bin-linux
          path: dist/pty-mgr-*

  build-darwin:
    # Build on macOS so the binaries get a valid native ad-hoc signature.
    # Cross-compiling darwin on Linux produces a signature AMFI rejects, which
    # makes Apple Silicon SIGKILL the binary on launch ("killed").
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Compile darwin binaries
        run: |
          bun build bin/pty-mgr.mjs --compile --target=bun-darwin-x64   --outfile dist/pty-mgr-darwin-x64
          bun build bin/pty-mgr.mjs --compile --target=bun-darwin-arm64 --outfile dist/pty-mgr-darwin-arm64

      - name: Ad-hoc code-sign and verify
        run: |
          codesign --force --sign - dist/pty-mgr-darwin-x64
          codesign --force --sign - dist/pty-mgr-darwin-arm64
          codesign --verify --verbose dist/pty-mgr-darwin-x64
          codesign --verify --verbose dist/pty-mgr-darwin-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: bin-darwin
          path: dist/pty-mgr-*

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/pty-mgr-linux-x64
            dist/pty-mgr-linux-arm64
            dist/pty-mgr-darwin-x64
            dist/pty-mgr-darwin-arm64

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Stage platform binaries
        run: |
          cp dist/pty-mgr-linux-x64   npm/linux-x64/pty-mgr
          cp dist/pty-mgr-linux-arm64  npm/linux-arm64/pty-mgr
          cp dist/pty-mgr-darwin-x64   npm/darwin-x64/pty-mgr
          cp dist/pty-mgr-darwin-arm64 npm/darwin-arm64/pty-mgr
          chmod +x npm/*/pty-mgr

      - name: Publish platform packages
        run: |
          publish_package() {
            dir="$1"
            cd "$dir"

            name="$(node -p "require('./package.json').name")"
            version="$(node -p "require('./package.json').version")"
            package="$name@$version"

            if npm view "$package" version >/dev/null 2>&1; then
              echo "$package is already published; skipping."
            else
              echo "publishing $package..."
              npm publish --access public
            fi

            cd - >/dev/null
          }

          publish_package npm/linux-x64
          publish_package npm/linux-arm64
          publish_package npm/darwin-x64
          publish_package npm/darwin-arm64

      - name: Publish main package
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          package="$name@$version"

          if npm view "$package" version >/dev/null 2>&1; then
            echo "$package is already published; skipping."
          else
            echo "publishing $package..."
            npm publish --access public
          fi
