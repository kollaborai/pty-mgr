name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `bun test` and the `bun run demo` smoke test (bin/pty-mgr.mjs demo ->
      # runDemo in lib/pty-manager.mjs, which spawns `zsh` inside a PTY) both
      # require zsh. ubuntu-latest does not guarantee it (not in the runner image
      # installed-software list), so install it explicitly.
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Test suite
        run: bun test

      - name: Smoke test
        run: timeout 45s bun run demo

      - name: Build check
        run: bun build bin/pty-mgr.mjs --compile --outfile /tmp/pty-mgr-ci
